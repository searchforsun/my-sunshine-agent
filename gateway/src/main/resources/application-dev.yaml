# ============================================================
# sunshine-gateway — 本地开发配置（--spring.profiles.active=dev）
# 无需 Nacos 即可启动，直连 localhost 各服务
# ============================================================

server:
  port: 8000

spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: sunshine-bff-api
          uri: http://localhost:8001
          predicates:
            - Path=/api/**
        - id: sunshine-llm-gateway-api
          uri: http://localhost:8300
          predicates:
            - Path=/v1/**
  sentinel:
    transport:
      dashboard: ecs4c16g:8858

logging:
  level:
    com.sunshine: debug
