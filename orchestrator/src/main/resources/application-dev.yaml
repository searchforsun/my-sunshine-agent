# ============================================================
# sunshine-orchestrator — 本地开发配置（--spring.profiles.active=dev）
# 无需 Nacos 即可启动，覆盖 application.yml 中的空值
# ============================================================

server:
  port: 8200

spring:
  datasource:
    url: jdbc:mysql://8.140.48.6:3306/sunshine_chat?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: 8.140.48.6
      port: 6379
      password: redis123

agent:
  system-prompt: 你是一个智能助手，优先检索知识库回答用户问题。
  max-iters: 5
  model:
    base-url: http://localhost:8300/v1
    name: deepseek-v4-pro
    api-key: sunshine-gateway
  history:
    max-messages: 20
  generation:
    ttl-sec: 3600
    orphan-timeout-sec: 120
    max-buffer-chunks: 10000
    reconnect-block-ms: 5000
    flush-interval-ms: 500
  resume:
    auto-on-reload: false
    max-resume-attempts: 3

logging:
  level:
    com.sunshine: debug
