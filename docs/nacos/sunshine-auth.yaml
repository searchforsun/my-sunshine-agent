# ============================================================
# sunshine-auth — Nacos 配置
# Data ID: sunshine-auth.yaml
# Group:   DEFAULT_GROUP
#
# 首次部署前请在 MySQL 执行:
#   CREATE DATABASE sunshine_auth;
# jwt-secret-key 生产环境请替换为强随机值，勿使用 dev 默认值
# ============================================================

server:
  port: 8100

spring:
  datasource:
    url: jdbc:mysql://ecs4c16g:3306/sunshine_auth?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ecs4c16g
      port: 6379
      password: redis123
      database: 1

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  is-read-header: true
  is-read-cookie: false
  token-style: jwt
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET:sunshine-auth-dev-jwt-secret-change-in-nacos}
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: false

logging:
  level:
    com.sunshine: debug
