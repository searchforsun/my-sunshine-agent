# ============================================================
# sunshine-skill-manager — Nacos 配置
# Data ID: sunshine-skill-manager.yaml
# Group:   DEFAULT_GROUP
# 首次部署：MySQL CREATE DATABASE sunshine_skill;
# Skill 包文件存储：MinIO ecs4c16g:9000 / bucket sunshine-skills
# ============================================================

server:
  port: 8225

spring:
  datasource:
    url: jdbc:mysql://ecs4c16g:3306/sunshine_skill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

skill:
  storage:
    type: minio
    base-dir: data/skills
    minio:
      endpoint: http://ecs4c16g:9000
      access-key: minioadmin
      secret-key: minioadmin123
      bucket: sunshine-skills

logging:
  level:
    com.sunshine: debug
