# ============================================================
# sunshine-gateway — Nacos 配置
# Data ID: sunshine-gateway.yaml
# Group:   DEFAULT_GROUP
# ============================================================

server:
  port: 8000

spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Vary, RETAIN_FIRST
      globalcors:
        # false：避免与 Gateway 全局 CORS 过滤器重复写响应头
        add-to-simple-url-handler-mapping: false
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "https://searchforsun.github.io"
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://127.0.0.1:5173"
              - "http://ecs4c16g:5173"
              - "http://8.140.215.65:5173"
              - "http://*:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 健康检查（StatusView 经 Gateway 统一探测，须在 /api/** 之前）
        - id: health-auth
          uri: lb://sunshine-auth
          predicates:
            - Path=/health/auth
          filters:
            - RewritePath=/health/auth, /health
        - id: health-bff
          uri: lb://sunshine-bff
          predicates:
            - Path=/health/bff
          filters:
            - RewritePath=/health/bff, /health
        - id: health-orchestrator
          uri: lb://sunshine-orchestrator
          predicates:
            - Path=/health/orchestrator
          filters:
            - RewritePath=/health/orchestrator, /health
        - id: health-tool-manager
          uri: lb://sunshine-tool-manager
          predicates:
            - Path=/health/tool-manager
          filters:
            - RewritePath=/health/tool-manager, /health
        - id: health-skill-manager
          uri: lb://sunshine-skill-manager
          predicates:
            - Path=/health/skill-manager
          filters:
            - RewritePath=/health/skill-manager, /health
        - id: health-llm-gateway
          uri: lb://sunshine-llm-gateway
          predicates:
            - Path=/health/llm-gateway
          filters:
            - RewritePath=/health/llm-gateway, /health
        - id: health-rag
          uri: lb://sunshine-rag
          predicates:
            - Path=/health/rag
          filters:
            - RewritePath=/health/rag, /health
        - id: health-prompt
          uri: lb://sunshine-prompt
          predicates:
            - Path=/health/prompt
          filters:
            - RewritePath=/health/prompt, /health
        - id: health-desensitize
          uri: lb://sunshine-desensitize
          predicates:
            - Path=/health/desensitize
          filters:
            - RewritePath=/health/desensitize, /health
        - id: health-finance
          uri: lb://sunshine-finance
          predicates:
            - Path=/health/finance
          filters:
            - RewritePath=/health/finance, /health
        - id: sunshine-auth-api
          uri: lb://sunshine-auth
          predicates:
            - Path=/api/auth/**
        - id: sunshine-bff-api
          uri: lb://sunshine-bff
          predicates:
            - Path=/api/**
        - id: sunshine-llm-gateway-api
          uri: lb://sunshine-llm-gateway
          predicates:
            - Path=/v1/**
    sentinel:
      transport:
        dashboard: ecs4c16g:8858
        port: 8720
        # Dashboard 与 Gateway 跨机时设为 Dashboard 可达 IP（见 docs/sentinel/README.md）
        client-ip: ${SENTINEL_CLIENT_IP:}
      eager: true
      datasource:
        gw-flow:
          nacos:
            server-addr: ecs4c16g:8848
            username: nacos
            password: nacos
            data-id: sunshine-gateway-gw-flow-rules.json
            group-id: DEFAULT_GROUP
            rule-type: gw-flow
      scg:
        # 晚于 UserIdInjectGatewayFilter(HIGHEST_PRECEDENCE+10)，确保 x-tenant-id 已注入
        order: -100
  data:
    redis:
      host: ecs4c16g
      port: 6379
      password: redis123
      database: 1

sunshine:
  gateway:
    tenant-qps:
      enabled: true

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  is-read-header: true
  is-read-cookie: false
  token-style: jwt
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET:sunshine-auth-dev-jwt-secret-change-in-nacos}
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: false

logging:
  level:
    com.sunshine: debug
