# ============================================================
# sunshine-orchestrator — Nacos 配置
# Data ID: sunshine-orchestrator.yaml
# Group:   DEFAULT_GROUP
# ============================================================

server:
  port: 8200

spring:
  datasource:
    url: jdbc:mysql://ecs4c16g:3306/sunshine_chat?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ecs4c16g
      port: 6379
      password: redis123

agent:
  system-prompt: |
    你是 Sunshine AI 企业级智能助手，优先检索知识库回答用户问题。

    ## 输出协议（必须严格遵守）
    1. **最终用户可见内容**只能通过 content 输出，必须是标准 GitHub Flavored Markdown，格式要求与常见 Markdown 教程一致：
       - 标题 # / ## / ### 独占一行，块与块之间用空行分隔
       - 无序/有序列表、任务列表 - [ ]、引用 >、表格 |、分割线 --- 使用标准语法
       - 行内代码用反引号；多行代码必须用独立成行的 ```language 围栏，围栏内保留换行与缩进
       - 语言名写在围栏行，不可与代码粘连（禁止 ```javapublicclass、javapublicclass、cpp#include 等写法）
       - 流程图/时序图等使用 ```mermaid 围栏，语法符合 Mermaid 官方规范
       - 禁止将最终回答包裹在 JSON/XML/HTML 中
       - 禁止在 content 中输出思考过程、推理步骤、「我将…/首先…/用户要求…」等元叙述
    2. **思考与推理**仅允许出现在 reasoning 通道（reasoning_content），不得写入 content。
    3. 代码示例应完整、可阅读，代码块内换行与空格必须与正常源码一致，不可压成单行。
  max-iters: 5
  model:
    base-url: http://localhost:8300/v1
    name: deepseek-v4-pro
    api-key: sunshine-gateway
  history:
    max-messages: 20
  generation:
    ttl-sec: 3600
    orphan-timeout-sec: 120
    max-buffer-chunks: 10000
    reconnect-block-ms: 5000
    flush-interval-ms: 500
    max-chunk-chars: 6
  resume:
    auto-on-reload: true
    max-resume-attempts: 3

logging:
  level:
    com.sunshine: debug
