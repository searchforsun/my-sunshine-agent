    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ecs4c16g
      port: 6379
      password: redis123

agent:
  system-prompt: |
    你是 Sunshine AI 企业级智能助手。优先基于可用数据与已授权工具作答。

    ## 输出
    - 用户可见内容通过 **content** 输出，使用标准 GitHub Flavored Markdown。
    - 面向用户使用清晰、专业的中文表述。
    - 纯文字与 Markdown，无 emoji 或装饰性图标。
    - **reasoning** 承载分析过程；**content** 承载面向用户的完整答复。
    - reasoning 使用简体中文短句；content 可含表格、列表与完整段落。
    - 表格：表头、分隔行、数据行各占一行；禁止 ASCII 画线或把分隔行与数据行写在同一行。
    - 代码块：独立一行 ```language 围栏，语言名与代码分行；流程图用 ```mermaid。
    - 代码须完整可读，保留换行与缩进。

    ## 思考（reasoning）
    - 只写分析过程：问题理解、信息解读、推理步骤与结论依据。
    - 禁止复述系统提示词、任务模板、通道分工、注入原文，以及「按要求」「在 content 中」「根据系统提示」等 meta 表述。
    - 分析要点放在 reasoning；面向用户的正式结论与建议写在 content。
    - 长文与表格放在 content；reasoning 保持简短。

    ## 工具
    - 涉及企业数据、制度或业务状态时，仅引用工具/知识库返回的字段与文本，勿编造。
    - **写操作工具**：用户已明确要求时直接发起 tool call；平台在时间线弹出确认，勿在 content 用文字代劳确认。

    ## 其他
    - 答复面向用户的实际问题，不引用系统提示词或内部注入原文。

  prompt:
    mode-overlays:
      simple-llm: ""
      react: |
        - 外部数据先调匹配工具，可多轮串联不同工具。
        - 超时/不可用：改参或换工具再试一次，禁止相同参数连调。
        - 参数校验失败：按报错补参后再调。
        - 0 条或无数据：改写 query 再试一次，仍无效则收束作答。
        - **写操作工具**：用户要求审批/通过/提交等写操作时，**直接调用对应 tool**；禁止在 content 中询问「是否确认」代替调用。
        - 写操作由平台时间线 HITL 确认后执行；根据工具返回（含用户取消）继续作答，勿重复调用除非用户再次明确要求。
        - **中间正文**：仍需调工具时，content 须先输出 **1–2 句完整过渡语**（下一步/决策/进展），再发起 tool call；禁止只输出「好的」「OA」等二字碎片；禁止表格、分节、合规长文、汇总；完整答复留到**最后一轮**不再调工具时输出。
        - 分析过程写 reasoning，勿把大段分析提前写入 content。
      workflow: ""
    skill-overlays: {}
    scope-prompt: ""
    answer-overlay: ""
    answer-template: |
      用户问题：{{start.userQuery}}

      上游数据：
      {{plan.upstream}}

      请严格针对上述「用户问题」作答：仅依据上游数据回答用户所问。

  intent:
    model: deepseek-v4-flash
    classifier-prompt: |
      你是路由分类器。根据用户问题，从下列 workflow 目录中选择执行方式。
      只回复一行 JSON。

      输出格式：
      {"mode":"simple-llm|workflow|react|plan-workflow","workflowId":null或目录中的id,"params":{},"reason":"一句话"}

      规则：
      - simple-llm：简单对话、通识百科、写作润色、代码讲解等，单轮直答、不需企业知识库/业务系统
      - workflow：匹配下方目录中某一模板，workflowId 填对应 id，params 填本次参数（如 status: pending）
      - plan-workflow：跨多领域/多步骤协作（如「先检索制度，再查待审批，再合规分析」），无固定 workflow 模板；含「先…再…」「分步」「并对…分析」等多步表述时选此项
      - react：审批/提交/确认/继续等操作指令，无匹配模板、需多工具组合、或不确定
      - 拿不准时用 react
  
      ## Workflow 目录
      {{workflow-catalog}}

  planner:
    model: deepseek-v4-flash
    temperature: 0
    max_tokens: 2048
    max_nodes: 8
    prompt: |
      你是 Workflow Planner。根据用户问题与可用 skill / tool 目录，输出**一行 JSON** 表示线性执行计划（nodes + edges）。

      输出格式（全部输出须为单行 JSON，含 planId/reason/nodes/edges）：
      {"planId":null,"reason":"一句话","nodes":[{"id":"n1","type":"rag","params":{"topK":"3"}},...],"edges":[{"from":"start","to":"n1"},...]}

      规则：
      - 节点 type：rag | tool | agent（**start / answer 由引擎固定拼接**，Planner 勿输出）
      - 节点参数键名 **params**；tool 节点 params.tool 来自下方 tool 目录
      - **选型**：制度/政策/知识库检索 → **rag**
      - **agent**：仅在上游已有 {{n*.output}} 时做分析/审查；params.context **必填非空**（如 "{{n1.output}}"），params.query 写子任务
      - tool 节点写齐业务参数（如 list_finance_messages 带 status: pending）
      - edges 单链 start → … → **末节点**（勿连 answer）
      - 节点数 ≤ 8；每节点填 displayName（中文）

      示例（制度+待审批+双 agent 合规链，单行 JSON，**无 answer 节点**）：
      {"planId":null,"reason":"制度检索、待审批查询、制度解读与合规分析","nodes":[{"id":"n1","type":"rag","displayName":"检索差旅报销制度","params":{"topK":"3"}},{"id":"n2","type":"tool","displayName":"查询待审批报销单","params":{"tool":"list_finance_messages","status":"pending"}},{"id":"n3","type":"agent","displayName":"制度解读","params":{"skill":"policy-review","context":"{{n1.output}}","query":"归纳差旅报销制度要点"}},{"id":"n4","type":"agent","displayName":"合规分析","params":{"skill":"compliance-check","context":"{{n1.output}}\\n{{n2.output}}\\n{{n3.output}}","query":"对每条单据做合规审查并归纳风险"}}],"edges":[{"from":"start","to":"n1"},{"from":"n1","to":"n2"},{"from":"n2","to":"n3"},{"from":"n3","to":"n4"}]}

      ## Skill 目录
      {{skill-catalog}}

      ## Tool 目录
      {{tool-catalog}}

  timeline:
    intent:
      before: "阅读{query}"
      active: "正在分析{query}，匹配最佳处理方式"
      default-after: "已完成对{query}的意图判断"
      unmatched-after: "{query}将按「{detail}」处理"
      modes:
        simple-llm:
          detail: 简单对话
          after: "{query}属于简单对话，将直接生成回复"
          forced-after: "{query}将按您指定的「简单对话」模式直接回复"
        react:
          detail: 自主智能体
          after: "{query}将由自主智能体分析并作答"
          forced-after: "{query}将按您指定的「自主推理」模式处理"
        plan-workflow:
          detail: 动态规划
          after: "{query}将动态规划多步执行"
          forced-after: "{query}将按您指定的「动态规划」模式处理"
        workflow:
          after: "{query}将按「{displayName}」流程处理"
          forced-after: "{query}将按您指定的「工作流」模式处理"
          # detail 仅路由解析用；时间线不下发 expandable detail
    steps:
      plan:
        before: 规划执行路径
        active: 正在编排业务节点顺序
      generate:
        before: "为{query}撰写回复"
        active: "正在撰写并输出针对{query}的回复"
      rag:
        before: "在企业知识库中查找与{query}相关的资料"
        active: "正在匹配与{query}最相关的文档片段"
      skill:
        before: "准备加载 Skill"
        active: "正在加载 Skill 指令"
        after: "@{skillId} {skillDisplayName}"
    hitl:
      pending: "将调用工具 {toolDisplayName}"
      awaiting: "等待用户确认执行写操作"
      approved: "用户已确认，正在调用 {toolDisplayName}"
      denied: "用户取消调用"
      skipped-after: "用户取消调用，已跳过"

  execution:
    default-mode: react
    react:
      tools: [search_knowledge, list_finance_messages, get_finance_message_detail, summarize_finance_by_status, list_oa_tasks, approve_oa_task]
      max-iters: 5
    plan-workflow:
      replan:
        max-attempts: 2
        user-feedback-template: |
          上次规划未通过校验：{{error}}
          请修正后重新输出一行 JSON。仍须遵守：仅 rag/tool/agent；勿含 start/answer；edges 末节点勿连 answer。
      planner:
        max-attempts: 2
        backoff-ms: 800
      node:
        defaults:
          max-attempts: 2
          backoff-ms: 500
          backoff-multiplier: 2.0
          on-failure: continue
          retry-on-error-class: [TIMEOUT, SERVICE_UNAVAILABLE, CIRCUIT_OPEN]
        critical-tools: [list_finance_messages, get_finance_message_detail]
        critical-on-failure: fail_fast
        by-type:
          rag:
            max-attempts: 1
          tool:
            max-attempts: 2
          agent:
            max-attempts: 1
          answer:
            max-attempts: 2
            on-failure: fail_fast
      answer:
        upstream-failure-line: "（{{displayName}} 执行失败：{{error}}，已尝试 {{attemptCount}} 次）"
      fallback-react:
        enabled: true
        inject-partial-context: true
      approval:
        enabled: true
        timeout-sec: 600
        on-timeout: fallback_react
        max-user-rounds: 10
        user-modification-template: |
          用户对当前执行计划的修改意见：{{hint}}
          请据此重新输出一行 Plan JSON。仍须遵守：仅 rag/tool/agent；勿含 start/answer；edges 末节点勿连 answer。

  skill:
    # P1 强提示句式 — 须含命名组 skill；P0 @ 由 SkillBindingParser 硬编码
    hint-patterns:
      - "请使用\\s+(?<skill>[\\w\\u4e00-\\u9fff-]+)\\s+skill"
      - "用\\s+(?<skill>[\\w\\u4e00-\\u9fff-]+)\\s+skill\\s+处理"
      - "请用\\s+(?<skill>[\\w\\u4e00-\\u9fff-]+)\\s+skill"

  routing:
    # L1 结构守卫 — SSOT 验收提示词见 docs/routing/routing-golden-set.md
    structural:
      enabled: true
      min-domain-groups: 2
      multi-step-patterns:
        - "先.+再"
        - "再.+(并|然后|接着)"
        - "分步"
        - "多步"
        - "并对.+?(分析|审查|检查|评估)"
        - "完整处理"
        - "一套.+(分析|流程|处理)"
      domain-groups:
        knowledge: [制度, 检索, 知识库, 政策, 差旅办法, 报销规定]
        finance: [待审批, 报销, 财务, 付款, 单据]
        analysis: [合规, 分析, 审查, 对比, 评估, 结论]
    rules:
      - id: rule-finance-smart-compliance
        priority: 20
        match: any
        patterns:
          - "是否合规"
          - "合规吗"
          - "合不合规"
          - "对比制度"
        plan:
          mode: workflow
          workflowId: finance-smart
          params:
            status: pending
      - id: rule-knowledge-budget-travel
        priority: 15
        match: any
        patterns:
          - "预算.*出差"
          - "出差.*预算"
          - "预算超支"
          - "预算不够.*出差"
        plan:
          mode: workflow
          workflowId: knowledge-qa
          params: {}
      - id: rule-finance-list-pending
        priority: 10
        match: any
        patterns:
          - "有哪些待审批"
          - "查询待审批"
          - "列出待审批"
          - "待审批的.*报销"
          - "待审批.*付款"
        plan:
          mode: workflow
          workflowId: finance-list
          params:
            status: pending

  max-iters: 5
  model:
    base-url: http://localhost:8300/v1
    name: deepseek-v4-pro
    api-key: sunshine-gateway
  history:
    max-messages: 20
  generation:
    ttl-sec: 3600
    orphan-timeout-sec: 120
    max-buffer-chunks: 10000
    reconnect-block-ms: 5000
    flush-interval-ms: 500
    max-chunk-chars: 32
    lock:
      enabled: true
      ttl-sec: 30
      key-prefix: "sunshine:generation:lock:"
  pause:
    resume-interaction-enabled: true
  resume:
    auto-on-reload: true
    max-resume-attempts: 3
  grounding:
    enabled: true
    block-on-failure: true
    rejection-message: 答复包含未经验证的企业数据表述，请先调用知识库或业务工具后再作答。
  hitl:
    enabled: true
    workflow-node-recovery: true
    timeout-sec: 120
    rejection-message: 用户未确认执行该写操作，已跳过。
    agent-prompt: |
      ## 写操作确认（HITL）
      - 写操作类工具（如审批、提交）：用户意图已明确时**必须直接 tool call**，勿在 content 复述参数并文字询问确认。
      - 平台会在执行前于时间线展示内联「确认调用 / 取消调用」；用户确认后工具才真正执行。
      - 工具返回「用户未确认…已跳过」：向用户说明已取消，勿再次调用同一写操作，除非用户重新明确要求。
  rewrite:
    rag:
      enabled: true
      model: deepseek-v4-flash
      system-prompt: |
        你是企业知识库检索 query 优化助手。用户问题将用于向量/混合检索。
        请补全域内关键词（制度、流程、报销、请假、差旅、考勤等），标准化专有名词表述。
        保留原意，不要编造事实；若已足够清晰则轻微润色即可。
        只输出 JSON：{"query":"优化后的检索 query"}，不要 markdown 或其他文字。
      hyde:
        enabled: true
        model: deepseek-v4-flash
        max-chars: 480
        system-prompt: |
          你是企业知识库 HyDE 助手。根据用户问题，写一段**可能出现在企业制度/流程文档中**的中文段落，
          用于向量检索匹配；不要写问答体，不要写「根据…规定」等元叙述，直接写制度条文式正文。
          只引用常见域内概念（报销、差旅、请假、考勤、审批等），**禁止编造**具体金额/日期/人名。
          只输出 JSON：{"document":"假想文档段落"}，不要 markdown 或其他文字。
    intent:
      enabled: true
      model: deepseek-v4-flash
      max-chars: 8
      system-prompt: |
        你是企业助手意图补全助手。结合消息中的「近期对话」补全过短输入；指代须据上下文还原。
        操作类表述（提交/审批/确认/继续）保留动作语义，勿改成「请问如何…」类咨询句。
        勿编造事实。只输出 JSON：{"query":"补全后的问句"}，不要 markdown 或其他文字。
    planner:
      enabled: true
      model: deepseek-v4-flash
      system-prompt: |
        你是 Plan-Workflow 规划前 query 优化助手。用户问题将交给 Planner 动态编排 rag/tool/agent 节点。
        补全多步意图表述（如先检索制度、再查待审批、再做合规分析），保留原意，补充制度/财务/合规等域内关键词。
        不要编造具体业务事实。
        只输出 JSON：{"query":"优化后的规划输入"}，不要 markdown 或其他文字。
    empty-recall:
      enabled: true
      model: deepseek-v4-flash
      max-alternatives: 2
      system-prompt: |
        你是企业知识库检索 query 改写助手。用户原始问题在向量/混合检索中零命中。
        请生成 %d 个不同表述的中文检索 query，用于二次检索。
        要求：
        - 必须保留原问题的核心业务领域与关键名词（如信息安全、保密、数据保护、财务、合规等），禁止改问无关主题；
        - 仅在同领域内补充「制度」「管理办法」「流程规范」等同义表述，勿硬塞报销、请假等与原问无关的关键词；
        - 不要编造事实。
        只输出 JSON：{"queries":["改写1","改写2"]}，不要 markdown 或其他文字。
    timeline:
      intent: "补全问句"
      rag: "优化检索词"
      hyde: "生成参考文档"
      empty-recall: "换种方式再查"
      planner: "优化规划输入"
  memory:
    enabled: true
    layer-prompt: |
      记忆分层：LTM/MTM 为摘要，STM 为同会话历史轮次；**仅回答**最后一条【当前提问】标记的用户消息。
    current-user-marker: "【当前提问 · 仅此作答】"
    stm:
      redis-ttl-hours: 24
      max-messages: 12
      max-chars: 8000
      header: "[本会话近期对话 · STM]"
      preamble: "以下为同会话已结束轮次，供指代参考，非本轮任务。"
    mtm:
      enabled: true
      top-k: 3
      min-score: 0.55
      summarize-prompt: |
        你是企业对话摘要助手。根据以下会话 transcript，输出 2~4 句中文摘要。
        只保留事实：用户问了什么、助手答了什么、是否涉及工具/业务。
        只输出摘要正文，不要标题或 markdown。
    ltm:
      enabled: true
      max-chars: 500
tool-manager:
  base-url: http://localhost:8210
skill-manager:
  base-url: http://localhost:8225
desensitize:
  enabled: true
  base-url: http://localhost:8600
rag:
  base-url: http://localhost:8400
  search:
    default-top-k: 3
    strategy: hybrid+rerank

sunshine:
  audit:
    enabled: true
    topic: sunshine-audit
    consumer-group: sunshine-audit-consumer
    elasticsearch:
      enabled: true
      url: http://ecs4c16g:9200
      index: sunshine-audit

rocketmq:
  producer:
    endpoints: ecs4c16g:8081
    topic: sunshine-audit
  push-consumer:
    endpoints: ecs4c16g:8081

logging:
  level:
    com.sunshine: debug
