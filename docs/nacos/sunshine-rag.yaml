# ============================================================
# sunshine-rag — Nacos 配置
# Data ID: sunshine-rag.yaml
# Group:   DEFAULT_GROUP
# ============================================================

server:
  port: 8400

spring:
  data:
    redis:
      host: ecs4c16g
      port: 6379
      password: redis123

milvus:
  host: ecs4c16g
  port: 19530
  database: default

embedding:
  api-key: ${EMBEDDING_API_KEY:${QWEN_API_KEY:sk-22e7ab6f7bbb4078b7163facb4d3aee0}}
  base-url: https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding
  model: text-embedding-v4

rag:
  admin:
    token: sunshine-rag-admin-dev
  elasticsearch:
    enabled: true
    url: http://ecs4c16g:9200
    index: sunshine_rag_chunks
  search:
    # IP 相似度下限（归一化向量下近似 cosine）；报销 vs 请假文档通常 < 0.48
    min-score: 0.48
    # 默认策略：vector | hybrid | hybrid+rerank（请求体 strategy 可覆盖）
    strategy: vector
    rrf-k: 60
    hybrid-pool-size: 20
  rerank:
    enabled: true
    # 复用 embedding.api-key；也可单独配置 rag.rerank.api-key
    model: gte-rerank-v2
    base-url: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
    input-size: 20
    timeout-seconds: 30
    min-score: 0.25
    min-relevance: 0.25

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: sunshine-rag

logging:
  level:
    com.sunshine: debug
