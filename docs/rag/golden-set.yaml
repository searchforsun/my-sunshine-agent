eval:
  top_k:
  - 3
  - 5
  - 10
  min_score: 0.48
  metrics:
  - recall_at_k
  - mrr
  - empty_rate
  - latency_ms
  production_gates:
    recall_at_3_min: 0.95
    recall_at_5_min: 0.98
    mrr_min: 0.92
    empty_rate_positive_max: 0.0
    empty_rate_negative_min: 0.95
    latency_p95_ms_max: 500
  phase3_v6_gates:
    description: v6 提升轨：hybrid+rerank 相对 vector 的提升阈值（阶段三 3.4）
    recall_at_5_improvement_vs_vector_min: 0.15
    mrr_improvement_vs_vector_min: 0.1
    latency_p95_ms_max_hybrid_rerank: 800
  suites:
    v5:
      exclude_categories:
      - adversarial
    v6:
      include_categories:
      - adversarial
