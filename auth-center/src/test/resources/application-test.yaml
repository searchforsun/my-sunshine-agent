spring:
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    url: jdbc:h2:mem:sunshine_auth;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 1

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  is-read-header: true
  is-read-cookie: false
  token-style: jwt
  jwt-secret-key: test-jwt-secret-key-for-unit-tests-only
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: false

logging:
  level:
    com.sunshine: warn
