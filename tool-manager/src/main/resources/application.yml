# 本地维护副本：docs/nacos/sunshine-tool-manager.yaml → scripts/sync_nacos.py 同步线上

spring:
  application:
    name: sunshine-tool-manager
  config:
    import:
      - optional:nacos:sunshine-tool-manager.yaml
  cloud:
    nacos:
      discovery:
        server-addr: ecs4c16g:8848
        username: nacos
        password: nacos
        group: SUNSHINE_V2
      config:
        server-addr: ecs4c16g:8848
        username: nacos
        password: nacos
        import-check:
          enabled: false
        file-extension: yaml
        group: DEFAULT_GROUP
