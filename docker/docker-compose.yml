  canal-server:
    image: canal/canal-server:v1.1.7
    container_name: smt-canal
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xms256m -Xmx256m"
    #   canal.admin.manager: http://canal-admin:8089
    #   canal.admin.port: "11110"
      canal.instance.master.address: mysql:3306
      canal.instance.dbUsername: root
      canal.instance.dbPassword: ${MYSQL_ROOT_PASSWORD:-root123}
      canal.instance.filter.regex: .*\\..*
    ports:
      - "${CANAL_PORT:-11111}:11111"
    networks:
      - smt-net
    depends_on:
      mysql:
        condition: service_healthy

  seata-server:
    image: seataio/seata-server:1.7.1
    container_name: smt-seata
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xms256m -Xmx256m"
      SEATA_PORT: 8091
      STORE_MODE: db
    ports:
      - "${SEATA_PORT:-8091}:8091"
      - "${SEATA_CONSOLE_PORT:-7091}:7091"
    volumes:
      - ./seata/application.yml:/seata-server/resources/application.yml
    networks:
      - smt-net
    depends_on:
      mysql:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: smt-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - smt-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: smt-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: ""
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - smt-net
    depends_on:
      - prometheus
      
  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    container_name: smt-etcd
    restart: unless-stopped
    command: >
      etcd -advertise-client-urls=http://0.0.0.0:2379
      -listen-client-urls=http://0.0.0.0:2379
    networks:
      - smt-net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus Standalone（内嵌 etcd + minio，无需外部依赖）
  milvus:
    image: milvusdb/milvus:v2.6.16
    container_name: smt-milvus
    command: ["milvus", "run", "standalone"]
    restart: unless-stopped
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_HTTP_PORT:-9091}:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    networks:
      - smt-net

volumes:
  prometheus-data:
  grafana-data:
  mysql-data:
  redis-data:
  nacos-data:
  rocketmq-namesrv-data:
  rocketmq-broker-data:
  es01-data:
  es02-data:
  es03-data:
  minio-data:
  milvus-data:
