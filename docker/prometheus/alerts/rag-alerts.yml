groups:
  - name: sunshine-rag
    rules:
      - alert: RagSearchP95High
        expr: |
          histogram_quantile(0.95,
            sum by (le, strategy) (rate(rag_search_duration_seconds_bucket[5m]))
          ) > 0.8
        for: 5m
        labels:
          severity: warning
          service: sunshine-rag
        annotations:
          summary: "RAG 检索 P95 延迟过高 ({{ $labels.strategy }})"
          description: "P95={{ $value }}s，阈值 800ms"

      - alert: RagSearchErrorRateHigh
        expr: |
          sum(rate(rag_search_errors_total[5m]))
          /
          sum(rate(rag_search_requests_total[5m])) > 0.05
        for: 3m
        labels:
          severity: critical
          service: sunshine-rag
        annotations:
          summary: "RAG 检索错误率过高"
          description: "错误率 {{ $value | humanizePercentage }} > 5%"

      - alert: RagEmptyRateHigh
        expr: |
          sum(rate(rag_empty_total[10m]))
          /
          sum(rate(rag_search_requests_total{status="success"}[10m])) > 0.3
        for: 10m
        labels:
          severity: warning
          service: sunshine-rag
        annotations:
          summary: "RAG 空召回率异常升高"
          description: "空召回占比 {{ $value | humanizePercentage }} > 30%"

      - alert: RagRerankErrorRateHigh
        expr: |
          sum(rate(rag_rerank_errors_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          service: sunshine-rag
        annotations:
          summary: "RAG Rerank 失败频繁"
          description: "Rerank 错误速率 {{ $value }}/s"
