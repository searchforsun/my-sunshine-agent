global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/rag-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # rag-service 在宿主机 :8400 启动（python scripts/start.py）
  - job_name: sunshine-rag
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8400']
        labels:
          application: sunshine-rag
